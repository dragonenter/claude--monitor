<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --blue: #58a6ff;
  --green: #3fb950;
  --orange: #f0883e;
  --red: #f85149;
  --purple: #d2a8ff;
  --yellow: #d29922;
  --card-shadow: 0 1px 3px rgba(0,0,0,.3), 0 0 0 1px var(--border);
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary); color: var(--text-primary); overflow: hidden;
}

/* ---- Top Bar ---- */
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; background: var(--bg-secondary);
  border-bottom: 1px solid var(--border); height: 52px;
}
.topbar-logo {
  font-size: 15px; font-weight: 700; color: var(--blue);
  display: flex; align-items: center; gap: 8px; white-space: nowrap;
}
.topbar-logo::before {
  content: ''; display: inline-block; width: 20px; height: 20px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 5px;
}
.session-select {
  background: var(--bg-primary); color: var(--text-primary); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px; font-size: 12px; font-family: inherit;
  max-width: 420px; min-width: 200px; outline: none;
  transition: border-color .2s;
}
.session-select:focus { border-color: var(--blue); }
.topbar-status {
  padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;
  white-space: nowrap; letter-spacing: .3px;
}
.status-active {
  background: linear-gradient(135deg, #0d281866, #23863622);
  color: var(--green); border: 1px solid #23863644;
}
.status-ended { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
.status-empty { background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }
.topbar-info { margin-left: auto; font-size: 12px; color: var(--text-secondary); white-space: nowrap; }

/* ---- Layout ---- */
.layout { display: grid; grid-template-columns: 270px 1fr 290px; height: calc(100vh - 52px); }

/* ---- Panels ---- */
.panel { overflow-y: auto; padding: 16px; scrollbar-width: thin; scrollbar-color: var(--bg-tertiary) transparent; }
.panel::-webkit-scrollbar { width: 6px; }
.panel::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
.panel-left { background: var(--bg-primary); border-right: 1px solid var(--border); }
.panel-center { background: var(--bg-primary); padding: 16px 20px; }
.panel-right { background: var(--bg-secondary); border-left: 1px solid var(--border); }
.panel-title {
  font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1.2px; margin-bottom: 12px; font-weight: 700;
}

/* ---- Center Tabs ---- */
.center-tabs {
  display: flex; gap: 4px; margin-bottom: 16px;
  background: var(--bg-secondary); border-radius: 10px; padding: 3px;
}
.center-tab {
  flex: 1; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: var(--text-secondary);
  border-radius: 8px; font-family: inherit; transition: all .2s;
}
.center-tab:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.center-tab.active {
  color: var(--blue); background: var(--bg-primary);
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.center-view { display: none; height: calc(100% - 50px); overflow-y: auto; }
.center-view.active { display: block; }

/* ---- Agent Tree ---- */
.agent-node {
  padding: 8px 12px; border-radius: 8px; margin-bottom: 4px;
  cursor: pointer; transition: all .15s;
  border: 1px solid transparent;
}
.agent-node:hover { background: var(--bg-secondary); border-color: var(--border); }
.agent-header { display: flex; align-items: center; gap: 8px; }
.agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-running { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
.dot-done { background: var(--text-muted); }
.dot-failed { background: var(--red); box-shadow: 0 0 6px var(--red); }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
.agent-name { font-size: 13px; font-weight: 600; }
.agent-type {
  font-size: 10px; color: var(--text-secondary);
  background: var(--bg-tertiary); padding: 1px 6px; border-radius: 4px;
}
.agent-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; padding-left: 16px; }
.agent-children { margin-left: 12px; border-left: 2px solid var(--bg-tertiary); padding-left: 8px; margin-top: 2px; }

/* ---- Event Feed ---- */
.event-item {
  display: flex; gap: 10px; padding: 10px 12px; margin-bottom: 4px;
  border-radius: 8px; transition: background .12s;
  animation: fadeIn .25s ease;
}
.event-item:hover { background: var(--bg-secondary); }
@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)} }
.event-time {
  font-size: 11px; color: var(--text-muted); width: 48px; flex-shrink: 0;
  padding-top: 2px; font-variant-numeric: tabular-nums;
}
.event-agent {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  height: fit-content; flex-shrink: 0; font-weight: 600;
}
.event-content { flex: 1; min-width: 0; }
.event-action { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.event-detail {
  font-size: 12px; color: var(--text-secondary); margin-top: 3px;
  word-break: break-all; line-height: 1.5;
}
.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 6px;
  font-weight: 600; white-space: nowrap;
}
.badge-dup { background: #3d1e00; color: var(--orange); }
.badge-new { background: #0d2818; color: var(--green); }
.badge-err { background: #3d0e0e; color: var(--red); }

/* Agent colors */
.ag-main { background: #1f6feb22; color: var(--blue); border: 1px solid #1f6feb33; }
.ag-0 { background: #23863622; color: var(--green); border: 1px solid #23863633; }
.ag-1 { background: #8957e522; color: var(--purple); border: 1px solid #8957e533; }
.ag-2 { background: #f0883e22; color: var(--orange); border: 1px solid #f0883e33; }
.ag-3 { background: #da363322; color: var(--red); border: 1px solid #da363333; }
.ag-4 { background: #bf8f0022; color: var(--yellow); border: 1px solid #bf8f0033; }

/* ---- Metric Cards ---- */
.metric-card {
  padding: 14px; background: var(--bg-primary);
  border-radius: 10px; margin-bottom: 10px;
  box-shadow: var(--card-shadow);
  transition: transform .15s;
}
.metric-card:hover { transform: translateY(-1px); }
.metric-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.metric-value { font-size: 26px; font-weight: 700; margin-top: 4px; line-height: 1; }
.metric-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.metric-row { display: flex; gap: 8px; }
.metric-row .metric-card { flex: 1; }

/* Token bars */
.token-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.token-label {
  font-size: 11px; color: var(--text-secondary); width: 70px; text-align: right;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.token-bar-bg { flex: 1; height: 16px; background: var(--bg-tertiary); border-radius: 4px; overflow: hidden; }
.token-bar-fill {
  height: 100%; border-radius: 4px;
  display: flex; align-items: center; padding-left: 6px;
  font-size: 10px; color: white; font-weight: 600; min-width: 20px;
  transition: width .4s ease;
}

/* Alerts */
.alert {
  padding: 10px 12px; border-radius: 8px;
  font-size: 12px; margin-bottom: 8px;
  display: flex; align-items: flex-start; gap: 8px;
  line-height: 1.4;
}
.alert-warn { background: #3d1e0088; border: 1px solid #f0883e33; color: var(--orange); }
.alert-error { background: #3d0e0e88; border: 1px solid #f8514933; color: var(--red); }
.alert-info { background: #0d281888; border: 1px solid #23863633; color: var(--green); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 200px; color: var(--text-muted);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: .2; }
.empty-state-text { font-size: 13px; text-align: center; line-height: 1.8; }

/* Typing dots */
.typing { display: inline-flex; gap: 3px; margin-left: 4px; vertical-align: middle; }
.typing span { width: 4px; height: 4px; background: var(--green); border-radius: 50%; animation: tdot 1.4s infinite both; }
.typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
@keyframes tdot { 0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1} }

/* ---- Overlay ---- */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(1,4,9,.85); z-index: 100;
  justify-content: center; align-items: center; backdrop-filter: blur(4px);
}
.overlay.show { display: flex; }
.overlay-content {
  background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 14px;
  width: 92%; max-width: 860px; max-height: 85vh; overflow-y: auto; padding: 24px;
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.overlay-close {
  float: right; background: var(--bg-tertiary); border: none; color: var(--text-secondary);
  font-size: 16px; cursor: pointer; padding: 4px 10px; border-radius: 6px;
  transition: all .15s;
}
.overlay-close:hover { color: var(--text-primary); background: var(--border); }

/* Overlay tabs */
.overlay-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg-primary); border-radius: 10px; padding: 3px; }
.overlay-tab {
  flex: 1; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: var(--text-secondary);
  border-radius: 8px; font-family: inherit; transition: all .2s; text-align: center;
}
.overlay-tab:hover { color: var(--text-primary); }
.overlay-tab.active { color: var(--blue); background: var(--bg-secondary); box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ---- Trace (方案1) ---- */
.trace-node {
  padding: 8px 12px; border-left: 3px solid var(--border);
  margin-left: 0; margin-bottom: 3px; border-radius: 0 6px 6px 0;
  transition: background .12s;
}
.trace-node:hover { background: var(--bg-tertiary); }
.trace-node.depth-0 { margin-left: 0; border-left-color: var(--blue); }
.trace-node.depth-1 { margin-left: 28px; border-left-color: var(--green); }
.trace-node.depth-2 { margin-left: 56px; border-left-color: var(--purple); }
.trace-header { display: flex; align-items: center; gap: 8px; font-size: 13px; flex-wrap: wrap; }
.trace-detail { font-size: 11px; color: var(--text-muted); margin-top: 3px; padding-left: 26px; word-break: break-all; }
.trace-duration {
  margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 6px;
  background: var(--bg-tertiary); color: var(--text-secondary); white-space: nowrap;
}
.trace-duration.slow { background: #3d1e00; color: var(--orange); }
.trace-icon {
  width: 22px; height: 22px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; color: white;
}
.ti-agent{background:#1f6feb} .ti-read{background:#238636} .ti-grep{background:#8957e5}
.ti-edit{background:#f0883e} .ti-bash{background:#6e7681} .ti-write{background:#58a6ff}
.ti-glob{background:#bf8f00} .ti-other{background:var(--text-muted)}

/* ---- Context Audit (方案2) ---- */
.audit-score-ring {
  width: 80px; height: 80px; position: relative; display: inline-block; vertical-align: middle;
}
.audit-score-ring svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.audit-score-ring circle { fill: none; stroke-width: 5; cx: 40; cy: 40; r: 34; }
.audit-score-ring .ring-bg { stroke: var(--bg-tertiary); }
.audit-score-ring .ring-fg { stroke-linecap: round; transition: stroke-dasharray .5s; }
.audit-score-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 20px; font-weight: 700;
}
.audit-section { margin-bottom: 16px; }
.audit-section h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; margin-bottom: 4px; border-radius: 6px; font-size: 12px;
  word-break: break-all; line-height: 1.4;
}
.ctx-present { background: #0d281866; color: var(--green); border: 1px solid #23863622; }
.ctx-missing { background: #3d0e0e66; color: var(--red); border: 1px solid #f8514922; }
.ctx-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ctx-dot.green { background: var(--green); }
.ctx-dot.red { background: var(--red); }
.ctx-note { margin-left: auto; font-size: 11px; opacity: .7; white-space: nowrap; }

.prompt-box {
  background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; font-size: 12px; line-height: 1.7;
  white-space: pre-wrap; word-break: break-all; max-height: 220px; overflow-y: auto;
  color: var(--text-secondary); font-family: 'SF Mono', 'Fira Code', monospace;
}
.prompt-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }

/* Timeline */
.timeline-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.timeline-label {
  font-size: 11px; color: var(--text-secondary); width: 72px; text-align: right;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.timeline-track { flex: 1; height: 20px; background: var(--bg-primary); border-radius: 5px; position: relative; overflow: hidden; }
.timeline-bar {
  position: absolute; height: 100%; border-radius: 4px; top: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white; font-weight: 600; min-width: 12px;
}

/* Section card for trace/audit */
.section-card {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
}
.section-card-title {
  font-size: 12px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 10px; font-weight: 700;
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo">Claude Code Monitor</div>
  <select class="session-select" id="sessionSelect">
    <option value="">-- 等待会话连接 --</option>
  </select>
  <span class="topbar-status status-empty" id="statusBadge">等待中</span>
  <span class="topbar-info" id="topInfo">监听 Hook 事件中...</span>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Left: Agent Tree -->
  <div class="panel panel-left" id="panelLeft">
    <div class="panel-title">Agent 树</div>
    <div id="agentTree">
      <div class="empty-state">
        <div class="empty-state-icon">&#9678;</div>
        <div class="empty-state-text">等待 Claude Code<br>启动新会话...</div>
      </div>
    </div>
  </div>

  <!-- Center: Tabbed Views -->
  <div class="panel panel-center" id="panelCenter">
    <div class="center-tabs">
      <button class="center-tab active" onclick="switchCenterTab(this,'view-feed')">事件流</button>
      <button class="center-tab" onclick="switchCenterTab(this,'view-trace')">调用链追踪</button>
      <button class="center-tab" onclick="switchCenterTab(this,'view-audit')">上下文审计</button>
    </div>
    <div class="center-view active" id="view-feed">
      <div id="eventFeed">
        <div class="empty-state">
          <div class="empty-state-icon">&#9673;</div>
          <div class="empty-state-text">Claude 工作时事件会实时显示在这里</div>
        </div>
      </div>
    </div>
    <div class="center-view" id="view-trace">
      <div id="traceView">
        <div class="empty-state">
          <div class="empty-state-icon">&#9678;</div>
          <div class="empty-state-text">调用链追踪<br>展示 Agent 层级关系和工具调用详情</div>
        </div>
      </div>
    </div>
    <div class="center-view" id="view-audit">
      <div id="auditView">
        <div class="empty-state">
          <div class="empty-state-icon">&#9670;</div>
          <div class="empty-state-text">上下文审计<br>分析 Subagent 接收到的上下文完整度</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Metrics -->
  <div class="panel panel-right" id="panelRight">
    <div class="panel-title">监控指标</div>
    <div id="metricsPanel">
      <div class="metric-row">
        <div class="metric-card">
          <div class="metric-label">工具调用</div>
          <div class="metric-value" style="color:var(--blue)" id="mToolCalls">0</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">已读文件</div>
          <div class="metric-value" style="color:var(--purple)" id="mFiles">0</div>
        </div>
      </div>
      <div class="metric-row">
        <div class="metric-card">
          <div class="metric-label">活跃 Agent</div>
          <div class="metric-value" style="color:var(--green)" id="mAgents">0</div>
          <div class="metric-sub" id="mAgentsSub">-</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">重复调用</div>
          <div class="metric-value" style="color:var(--orange)" id="mDuplicates">0</div>
          <div class="metric-sub" id="mEfficiency">-</div>
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-label">运行时长</div>
        <div class="metric-value" style="color:var(--text-secondary)" id="mDuration">0s</div>
      </div>

      <div class="panel-title" style="margin-top:16px">Agent 负载</div>
      <div id="agentBars"></div>

      <div class="panel-title" style="margin-top:16px">告警</div>
      <div id="alertsPanel"><div style="font-size:12px;color:var(--text-muted)">暂无告警</div></div>
    </div>
  </div>
</div>

<!-- Drill-down Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-content">
    <button class="overlay-close" onclick="closeOverlay()">&times;</button>
    <div id="overlayBody"></div>
  </div>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let currentSessionId = null;
let sessionCache = {};
let agentColorMap = {};
let agentColorIdx = 0;
const AGENT_COLORS = ['ag-0','ag-1','ag-2','ag-3','ag-4'];

function agentColor(agentId) {
  if (agentId === 'main') return 'ag-main';
  if (!agentColorMap[agentId]) {
    agentColorMap[agentId] = AGENT_COLORS[agentColorIdx % AGENT_COLORS.length];
    agentColorIdx++;
  }
  return agentColorMap[agentId];
}

function shortId(id) {
  if (!id || id === 'main') return 'Main';
  // Show type prefix if available
  if (id.length > 14) return id.slice(0, 12) + '..';
  return id;
}

function fmtTime(ts, base) {
  const d = Math.max(0, ts - (base || ts));
  const m = Math.floor(d / 60);
  const s = Math.floor(d % 60);
  return m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `0:${String(s).padStart(2,'0')}`;
}

function fmtDuration(secs) {
  if (secs < 60) return `${Math.floor(secs)}s`;
  return `${Math.floor(secs/60)}m ${Math.floor(secs%60)}s`;
}

function toolIcon(name) {
  const map = {Agent:'ti-agent',Read:'ti-read',Grep:'ti-grep',Edit:'ti-edit',Bash:'ti-bash',Write:'ti-write',Glob:'ti-glob'};
  return map[name] || 'ti-other';
}
function toolLetter(name) {
  const map = {Agent:'A',Read:'R',Grep:'G',Edit:'E',Bash:'$',Write:'W',Glob:'*'};
  return map[name] || '?';
}
function toolNameCN(name) {
  const map = {Agent:'派发子Agent',Read:'读取文件',Grep:'搜索内容',Edit:'编辑文件',Bash:'执行命令',Write:'写入文件',Glob:'搜索文件'};
  return map[name] || name;
}

function toolSummary(e) {
  const inp = e.tool_input || {};
  switch(e.tool_name) {
    case 'Grep': return `搜索 "${(inp.pattern||'').slice(0,60)}" 路径: ${inp.path||'./'}`;
    case 'Read': return `${inp.file_path||''}`;
    case 'Edit': return `${inp.file_path||''}`;
    case 'Write': return `${inp.file_path||''}`;
    case 'Glob': return `模式 "${(inp.pattern||'').slice(0,60)}"`;
    case 'Bash': return `$ ${(inp.command||'').slice(0,80)}`;
    case 'Agent': return `"${(inp.prompt||'').slice(0,80)}"`;
    default: return JSON.stringify(inp).slice(0,80);
  }
}

function toolSummaryFromTC(tc) {
  return toolSummary({tool_name: tc.tool_name, tool_input: tc.tool_input});
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =========================================================================
// Center tab switching
// =========================================================================
function switchCenterTab(btn, viewId) {
  btn.parentElement.querySelectorAll('.center-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.center-view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
}

// =========================================================================
// Render: Agent Tree
// =========================================================================
function renderAgentTree(session) {
  const el = document.getElementById('agentTree');
  if (!session || !session.agents || session.agents.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9678;</div><div class="empty-state-text">暂无 Agent</div></div>';
    return;
  }
  const byId = {};
  session.agents.forEach(a => byId[a.agent_id] = {...a, children: []});
  const roots = [];
  session.agents.forEach(a => {
    if (a.parent_id && byId[a.parent_id]) byId[a.parent_id].children.push(byId[a.agent_id]);
    else roots.push(byId[a.agent_id]);
  });

  function renderNode(node) {
    const dotCls = node.status === 'running' ? 'dot-running' : node.status === 'failed' ? 'dot-failed' : 'dot-done';
    const dur = node.ended_at ? fmtDuration(node.ended_at - node.started_at) : '运行中';
    const typingHtml = node.status === 'running' ? ' <span class="typing"><span></span><span></span><span></span></span>' : '';
    const dups = (node.tool_calls||[]).filter(tc => tc && tc.is_duplicate).length;
    const dupBadge = dups > 0 ? ` <span class="badge badge-dup">${dups} 重复</span>` : '';

    let html = `<div class="agent-node" onclick="showAgentDetail('${node.agent_id}')">
      <div class="agent-header">
        <div class="agent-dot ${dotCls}"></div>
        <span class="agent-name">${shortId(node.agent_id)}</span>
        <span class="agent-type">${node.agent_type || ''}</span>
        ${dupBadge}
      </div>
      <div class="agent-meta">${node.tool_calls_count || 0} 次调用 · ${dur}${typingHtml}</div>
    </div>`;

    if (node.children.length > 0) {
      html += '<div class="agent-children">';
      node.children.forEach(c => html += renderNode(c));
      html += '</div>';
    }
    return html;
  }

  el.innerHTML = roots.map(renderNode).join('');
}

// =========================================================================
// Render: Event Feed
// =========================================================================
function renderEventFeed(session) {
  const el = document.getElementById('eventFeed');
  if (!session || !session.events || session.events.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9673;</div><div class="empty-state-text">暂无事件</div></div>';
    return;
  }
  const base = session.started_at;
  let html = '';
  const events = session.events.slice(-300);
  events.forEach(e => {
    const eName = e.hook_event_name;
    const agId = e.agent_id || 'main';
    const colorCls = agentColor(agId);
    let action = '', detail = '', badges = '';

    if (eName === 'PreToolUse') {
      action = `<div class="trace-icon ${toolIcon(e.tool_name)}" style="width:18px;height:18px;font-size:9px;display:inline-flex">${toolLetter(e.tool_name)}</div> ${toolNameCN(e.tool_name)}`;
      detail = toolSummary(e);
      if (e._is_duplicate) badges += `<span class="badge badge-dup">重复: ${shortId(e._duplicate_of)}</span>`;
    } else if (eName === 'PostToolUse') {
      return;
    } else if (eName === 'SubagentStart') {
      action = '子 Agent 启动';
      detail = `类型: ${e.agent_type || ''} · ID: ${shortId(e.agent_id)}`;
      badges = '<span class="badge badge-new">新建</span>';
    } else if (eName === 'SubagentStop') {
      action = '子 Agent 结束';
      detail = `类型: ${e.agent_type || ''} · ID: ${shortId(e.agent_id)}`;
    } else if (eName === 'SessionStart') {
      action = '会话启动';
      detail = session.cwd || '';
    } else if (eName === 'SessionEnd') {
      action = '会话结束';
    } else {
      action = eName;
    }

    html += `<div class="event-item">
      <span class="event-time">${fmtTime(e.received_at, base)}</span>
      <span class="event-agent ${colorCls}">${shortId(agId)}</span>
      <div class="event-content">
        <div class="event-action">${action} ${badges}</div>
        <div class="event-detail">${escHtml(detail)}</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
  el.parentElement.scrollTop = el.parentElement.scrollHeight;
}

// =========================================================================
// Render: Call Trace (方案1)
// =========================================================================
function renderTraceView(session) {
  const el = document.getElementById('traceView');
  if (!session || !session.agents || session.agents.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9678;</div><div class="empty-state-text">暂无调用链数据</div></div>';
    return;
  }

  const byId = {};
  session.agents.forEach(a => byId[a.agent_id] = {...a, children: []});
  const roots = [];
  session.agents.forEach(a => {
    if (a.parent_id && byId[a.parent_id]) byId[a.parent_id].children.push(byId[a.agent_id]);
    else roots.push(byId[a.agent_id]);
  });

  const base = session.started_at;
  let html = '';

  // Timeline
  html += `<div class="section-card"><div class="section-card-title">时间线</div>`;
  let maxEnd = base;
  session.agents.forEach(a => { const end = a.ended_at || (Date.now()/1000); if (end > maxEnd) maxEnd = end; });
  const totalSpan = Math.max(maxEnd - base, 0.1);

  session.agents.forEach(a => {
    const start = a.started_at || base;
    const end = a.ended_at || (Date.now()/1000);
    const leftPct = ((start - base) / totalSpan) * 100;
    const widthPct = Math.max(((end - start) / totalSpan) * 100, 3);
    const colors = {Main:'#1f6feb',Explore:'#238636',Plan:'#8957e5',general:'#f0883e'};
    const bg = colors[a.agent_type] || '#6e7681';
    const dups = (a.tool_calls||[]).filter(tc => tc && tc.is_duplicate).length;
    const dupStyle = dups > 0 ? 'border:1px dashed var(--orange);' : '';

    html += `<div class="timeline-row">
      <span class="timeline-label" title="${a.agent_id}">${a.agent_type || shortId(a.agent_id)}</span>
      <div class="timeline-track">
        <div class="timeline-bar" style="left:${leftPct}%;width:${widthPct}%;background:${bg};${dupStyle}">${a.agent_type||''} ${dups > 0 ? '('+dups+' 重复)' : ''}</div>
      </div>
    </div>`;
  });
  html += `</div>`;

  // Call tree
  html += `<div class="section-card"><div class="section-card-title">调用树</div>`;

  function renderTreeNode(node, depth) {
    const dur = node.ended_at ? fmtDuration(node.ended_at - node.started_at) : '运行中';
    const tcs = node.tool_calls || [];
    const dups = tcs.filter(tc => tc && tc.is_duplicate).length;
    const dupBadge = dups > 0 ? `<span class="badge badge-dup">${dups} 重复</span>` : '';

    let h = `<div class="trace-node depth-${Math.min(depth,2)}" style="cursor:pointer" onclick="showAgentDetail('${node.agent_id}')">
      <div class="trace-header">
        <div class="trace-icon ti-agent">${depth === 0 ? 'M' : 'A'}</div>
        <strong>${shortId(node.agent_id)}</strong>
        <span style="color:var(--text-secondary)">${node.agent_type||''} · ${tcs.length} 次调用</span>
        ${dupBadge}
        <span class="trace-duration">${dur}</span>
      </div>
    </div>`;

    tcs.forEach(tc => {
      if (!tc) return;
      const dupHtml = tc.is_duplicate ? `<span class="badge badge-dup">重复</span>` : '';
      const durMs = (tc.ended_at && tc.started_at) ? Math.round((tc.ended_at - tc.started_at) * 1000) : null;
      const durStr = durMs !== null ? (durMs > 1000 ? `${(durMs/1000).toFixed(1)}s` : `${durMs}ms`) : '';
      h += `<div class="trace-node depth-${Math.min(depth+1,2)}">
        <div class="trace-header">
          <div class="trace-icon ${toolIcon(tc.tool_name)}">${toolLetter(tc.tool_name)}</div>
          <span>${toolNameCN(tc.tool_name)}</span>
          ${dupHtml}
          ${durStr ? `<span class="trace-duration">${durStr}</span>` : ''}
        </div>
        <div class="trace-detail">${escHtml(toolSummaryFromTC(tc))}</div>
      </div>`;
    });

    node.children.forEach(child => { h += renderTreeNode(child, depth + 1); });
    return h;
  }

  roots.forEach(root => { html += renderTreeNode(root, 0); });
  html += `</div>`;
  el.innerHTML = html;
}

// =========================================================================
// Render: Context Audit (方案2)
// =========================================================================
function renderAuditView(session) {
  const el = document.getElementById('auditView');
  if (!session || !session.agents) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9670;</div><div class="empty-state-text">暂无审计数据</div></div>';
    return;
  }
  const subagents = session.agents.filter(a => a.parent_id && a.context_audit);
  if (subagents.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#9670;</div><div class="empty-state-text">尚未派发子 Agent<br>当使用子 Agent 时，上下文审计会自动出现</div></div>';
    return;
  }

  let html = '';

  // Score overview cards
  html += `<div class="section-card"><div class="section-card-title">上下文完整度评分</div>`;
  html += `<div style="display:flex;gap:12px;flex-wrap:wrap">`;
  subagents.forEach(a => {
    const audit = a.context_audit;
    const scoreColor = audit.score >= 80 ? 'var(--green)' : audit.score >= 50 ? 'var(--orange)' : 'var(--red)';
    const circumference = 2 * Math.PI * 34;
    const dashLen = (audit.score / 100) * circumference;
    html += `<div style="flex:1;min-width:150px;padding:14px;background:var(--bg-primary);border-radius:10px;text-align:center;box-shadow:var(--card-shadow)">
      <div class="audit-score-ring">
        <svg><circle class="ring-bg" r="34" cx="40" cy="40"/><circle class="ring-fg" r="34" cx="40" cy="40" stroke="${scoreColor}" stroke-dasharray="${dashLen} ${circumference}"/></svg>
        <span class="audit-score-text" style="color:${scoreColor}">${audit.score}%</span>
      </div>
      <div style="font-size:13px;font-weight:600;margin-top:8px">${shortId(a.agent_id)}</div>
      <div style="font-size:11px;color:var(--text-secondary)">${a.agent_type}</div>
    </div>`;
  });
  html += `</div></div>`;

  // Detail per subagent
  subagents.forEach(a => {
    const audit = a.context_audit;
    const scoreColor = audit.score >= 80 ? 'var(--green)' : audit.score >= 50 ? 'var(--orange)' : 'var(--red)';

    html += `<div class="section-card">`;
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div class="agent-dot ${a.status === 'running' ? 'dot-running' : 'dot-done'}"></div>
      <span style="font-size:14px;font-weight:700">${shortId(a.agent_id)}</span>
      <span class="agent-type">${a.agent_type}</span>
      <span style="font-size:11px;color:var(--text-secondary)">父级: ${shortId(audit.parent_id)}</span>
      <span style="margin-left:auto;font-size:13px;font-weight:700;color:${scoreColor}">${audit.score}%</span>
    </div>`;

    if (audit.missing.length > 0) {
      html += `<div class="audit-section"><h4 style="color:var(--red)">缺失上下文（未传递给子 Agent）</h4>`;
      audit.missing.forEach(item => {
        html += `<div class="ctx-item ctx-missing">
          <div class="ctx-dot red"></div>
          <strong>${item.type === 'file' ? '文件' : '搜索'}:</strong> ${escHtml(item.value)}
          <span class="ctx-note">${escHtml(item.note === 'child re-read this file' ? '子Agent重新读取' : item.note === 'child re-searched' ? '子Agent重新搜索' : item.note)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    if (audit.present.length > 0) {
      html += `<div class="audit-section"><h4 style="color:var(--green)">已传递上下文</h4>`;
      audit.present.forEach(item => {
        html += `<div class="ctx-item ctx-present">
          <div class="ctx-dot green"></div>
          <strong>${item.type === 'file' ? '文件' : '搜索'}:</strong> ${escHtml(item.value)}
          <span class="ctx-note">${escHtml(item.note === 'mentioned in prompt' ? '在Prompt中提及' : item.note === 'not needed by child' ? '子Agent未使用' : item.note)}</span>
        </div>`;
      });
      html += `</div>`;
    }

    if (audit.dispatch_prompt) {
      html += `<div class="audit-section">
        <div class="prompt-label">派发 Prompt</div>
        <div class="prompt-box">${escHtml(audit.dispatch_prompt)}</div>
      </div>`;
    }
    html += `</div>`;
  });

  el.innerHTML = html;
}

// =========================================================================
// Render: Metrics
// =========================================================================
function renderMetrics(session) {
  if (!session || !session.metrics) return;
  const m = session.metrics;

  document.getElementById('mToolCalls').textContent = m.tool_calls;
  document.getElementById('mAgents').textContent = m.agents_active;
  document.getElementById('mAgentsSub').textContent = `共 ${m.agents_total} 个, ${m.agents_active} 个活跃`;
  document.getElementById('mDuplicates').textContent = m.duplicates;
  document.getElementById('mEfficiency').textContent = `效率: ${m.efficiency}%`;
  document.getElementById('mFiles').textContent = m.files_read;
  document.getElementById('mDuration').textContent = fmtDuration(m.duration);

  const barsEl = document.getElementById('agentBars');
  if (session.agents && session.agents.length > 0) {
    const maxCalls = Math.max(...session.agents.map(a => a.tool_calls_count || 1));
    barsEl.innerHTML = session.agents.map(a => {
      const pct = Math.round(((a.tool_calls_count || 0) / maxCalls) * 100);
      const colors = {Main:'#1f6feb',Explore:'#238636',Plan:'#8957e5',general:'#f0883e'};
      const c = colors[a.agent_type] || '#6e7681';
      return `<div class="token-row">
        <span class="token-label">${a.agent_type || shortId(a.agent_id)}</span>
        <div class="token-bar-bg">
          <div class="token-bar-fill" style="width:${pct}%;background:${c}">${a.tool_calls_count || 0} 次</div>
        </div>
      </div>`;
    }).join('');
  }

  const alertsEl = document.getElementById('alertsPanel');
  let alerts = '';
  if (m.duplicates > 0) alerts += `<div class="alert alert-warn"><span>&#9888;</span> 检测到 ${m.duplicates} 次重复工具调用</div>`;
  if (m.efficiency < 80) alerts += `<div class="alert alert-error"><span>&#10007;</span> 效率低于 80%（当前 ${m.efficiency}%）</div>`;
  if (m.agents_active > 0) alerts += `<div class="alert alert-info"><span>&#10003;</span> ${m.agents_active} 个 Agent 正在工作中</div>`;
  alertsEl.innerHTML = alerts || '<div style="font-size:12px;color:var(--text-muted)">暂无告警</div>';
}

function renderAll(session) {
  renderAgentTree(session);
  renderEventFeed(session);
  renderTraceView(session);
  renderAuditView(session);
  renderMetrics(session);

  const badge = document.getElementById('statusBadge');
  if (session.status === 'active') {
    badge.textContent = '运行中';
    badge.className = 'topbar-status status-active';
  } else {
    badge.textContent = '已结束';
    badge.className = 'topbar-status status-ended';
  }
  const dir = (session.cwd||'').split('/').slice(-2).join('/');
  document.getElementById('topInfo').textContent = `${dir} · ${fmtDuration(session.metrics?.duration || 0)}`;
}

// =========================================================================
// Agent drill-down overlay
// =========================================================================
function showAgentDetail(agentId) {
  const session = sessionCache[currentSessionId];
  if (!session) return;
  const agent = session.agents.find(a => a.agent_id === agentId);
  if (!agent) return;

  const hasAudit = agent.context_audit && agent.parent_id;
  const tcs = agent.tool_calls || [];
  const dur = agent.ended_at ? fmtDuration(agent.ended_at - agent.started_at) : '运行中';
  const dotColor = agent.status === 'running' ? 'var(--green)' : agent.status === 'failed' ? 'var(--red)' : 'var(--text-muted)';

  let html = `<h3 style="color:var(--blue);margin-bottom:4px;font-size:16px">
    ${shortId(agentId)} <span style="color:var(--text-secondary);font-weight:400;font-size:13px">${agent.agent_type || ''}</span>
  </h3>`;
  html += `<p style="font-size:12px;color:var(--text-secondary);margin-bottom:16px">
    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};vertical-align:middle;margin-right:4px"></span>
    ${agent.status === 'running' ? '运行中' : agent.status === 'failed' ? '失败' : '已完成'} · ${tcs.length} 次调用 · ${dur}
    ${agent.parent_id ? ' · 父级: ' + shortId(agent.parent_id) : ''}
  </p>`;

  html += `<div class="overlay-tabs">
    <button class="overlay-tab active" onclick="switchTab(this,'tab-trace')">调用详情</button>
    ${hasAudit ? '<button class="overlay-tab" onclick="switchTab(this,\'tab-audit\')">上下文审计</button>' : ''}
    <button class="overlay-tab" onclick="switchTab(this,'tab-timeline')">时间线</button>
  </div>`;

  // Tab 1: Calls
  html += `<div class="tab-content active" id="tab-trace">`;
  if (tcs.length === 0) {
    html += '<div style="color:var(--text-muted);font-size:12px;padding:20px 0;text-align:center">暂无工具调用</div>';
  } else {
    tcs.forEach(tc => {
      if (!tc) return;
      const dupHtml = tc.is_duplicate ? `<span class="badge badge-dup">重复: ${shortId(tc.duplicate_of)}</span>` : '';
      const durMs = (tc.ended_at && tc.started_at) ? Math.round((tc.ended_at - tc.started_at) * 1000) : null;
      const durStr = durMs !== null ? (durMs > 1000 ? `${(durMs/1000).toFixed(1)}s` : `${durMs}ms`) : '';
      html += `<div class="trace-node depth-0">
        <div class="trace-header">
          <div class="trace-icon ${toolIcon(tc.tool_name)}">${toolLetter(tc.tool_name)}</div>
          <strong>${toolNameCN(tc.tool_name)}</strong>
          ${dupHtml}
          ${durStr ? `<span class="trace-duration">${durStr}</span>` : ''}
        </div>
        <div class="trace-detail">${escHtml(toolSummaryFromTC(tc))}</div>
      </div>`;
    });
  }
  html += `</div>`;

  // Tab 2: Audit
  if (hasAudit) {
    const audit = agent.context_audit;
    const scoreColor = audit.score >= 80 ? 'var(--green)' : audit.score >= 50 ? 'var(--orange)' : 'var(--red)';
    const circumference = 2 * Math.PI * 34;
    const dashLen = (audit.score / 100) * circumference;

    html += `<div class="tab-content" id="tab-audit">`;
    html += `<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div class="audit-score-ring">
        <svg><circle class="ring-bg" r="34" cx="40" cy="40"/><circle class="ring-fg" r="34" cx="40" cy="40" stroke="${scoreColor}" stroke-dasharray="${dashLen} ${circumference}"/></svg>
        <span class="audit-score-text" style="color:${scoreColor}">${audit.score}%</span>
      </div>
      <div>
        <div style="font-size:15px;font-weight:700;color:${scoreColor}">上下文完整度</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">
          父级 (${shortId(audit.parent_id)}) 已读取 ${audit.parent_files_count} 个文件, ${audit.parent_searches_count} 次搜索
        </div>
      </div>
    </div>`;

    if (audit.missing.length > 0) {
      html += `<div class="audit-section"><h4 style="color:var(--red)">缺失上下文</h4>`;
      audit.missing.forEach(item => {
        html += `<div class="ctx-item ctx-missing"><div class="ctx-dot red"></div>${escHtml(item.value)}<span class="ctx-note">${escHtml(item.note)}</span></div>`;
      });
      html += `</div>`;
    }
    if (audit.present.length > 0) {
      html += `<div class="audit-section"><h4 style="color:var(--green)">已传递</h4>`;
      audit.present.forEach(item => {
        html += `<div class="ctx-item ctx-present"><div class="ctx-dot green"></div>${escHtml(item.value)}<span class="ctx-note">${escHtml(item.note)}</span></div>`;
      });
      html += `</div>`;
    }
    if (audit.dispatch_prompt) {
      html += `<div class="audit-section"><div class="prompt-label">派发 Prompt</div><div class="prompt-box">${escHtml(audit.dispatch_prompt)}</div></div>`;
    }
    html += `</div>`;
  }

  // Tab 3: Timeline
  html += `<div class="tab-content" id="tab-timeline">`;
  if (tcs.length > 0) {
    const firstTs = tcs[0]?.started_at || agent.started_at;
    const lastTs = agent.ended_at || (tcs[tcs.length-1]?.ended_at || firstTs);
    const totalSpan = Math.max(lastTs - firstTs, 0.1);
    const barColors = {Read:'#238636',Grep:'#8957e5',Edit:'#f0883e',Bash:'#6e7681',Write:'#58a6ff',Agent:'#1f6feb',Glob:'#bf8f00'};

    tcs.forEach(tc => {
      if (!tc) return;
      const start = tc.started_at || firstTs;
      const end = tc.ended_at || start + 0.1;
      const leftPct = ((start - firstTs) / totalSpan) * 100;
      const widthPct = Math.max(((end - start) / totalSpan) * 100, 2);
      const bg = barColors[tc.tool_name] || 'var(--text-muted)';
      const dupStyle = tc.is_duplicate ? 'opacity:.6;border:1px solid var(--orange);' : '';
      html += `<div class="timeline-row">
        <span class="timeline-label">${toolNameCN(tc.tool_name)}</span>
        <div class="timeline-track">
          <div class="timeline-bar" style="left:${leftPct}%;width:${widthPct}%;background:${bg};${dupStyle}">${toolLetter(tc.tool_name)}</div>
        </div>
      </div>`;
    });
  } else {
    html += '<div style="color:var(--text-muted);font-size:12px;padding:20px 0;text-align:center">暂无时间线数据</div>';
  }
  html += `</div>`;

  document.getElementById('overlayBody').innerHTML = html;
  document.getElementById('overlay').classList.add('show');
}

function switchTab(btn, tabId) {
  btn.parentElement.querySelectorAll('.overlay-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.overlay-content').querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target.id === 'overlay') closeOverlay(); });

// Data fetching
// =========================================================================
async function fetchSessions() {
  try { const r = await fetch('/api/sessions'); return await r.json(); } catch { return []; }
}
async function fetchSession(sid) {
  try { const r = await fetch(`/api/session/${sid}`); const d = await r.json(); sessionCache[sid] = d; return d; } catch { return null; }
}

function updateSessionSelect(list) {
  const sel = document.getElementById('sessionSelect');
  const prevVal = sel.value;
  const newIds = list.map(s => s.session_id).join(',');
  if (sel.dataset.ids === newIds) return;
  sel.dataset.ids = newIds;
  sel.innerHTML = '';
  if (list.length === 0) { sel.innerHTML = '<option value="">-- 等待会话连接 --</option>'; return; }

  list.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.session_id;
    const status = s.status === 'active' ? '🟢' : '⚪';
    const dir = (s.cwd || '').split('/').slice(-2).join('/');
    opt.textContent = `${status} ${dir} (${s.session_id.slice(0,8)}) · ${s.metrics?.tool_calls || 0} 次调用`;
    sel.appendChild(opt);
  });

  if (prevVal && list.find(s => s.session_id === prevVal)) sel.value = prevVal;
  else { const active = list.find(s => s.status === 'active'); sel.value = active ? active.session_id : list[0].session_id; }
  if (sel.value !== currentSessionId) { currentSessionId = sel.value; refresh(); }
}

document.getElementById('sessionSelect').addEventListener('change', e => { currentSessionId = e.target.value; refresh(); });

async function refresh() {
  if (!currentSessionId) return;
  const session = await fetchSession(currentSessionId);
  if (session) renderAll(session);
}

// =========================================================================
// SSE
// =========================================================================
function connectSSE() {
  const es = new EventSource('/stream');
  es.onmessage = async (msg) => {
    try {
      const event = JSON.parse(msg.data);
      const sid = event.session_id;
      if (!sid) return;
      const list = await fetchSessions();
      updateSessionSelect(list);
      if (sid === currentSessionId) await refresh();
    } catch(e) { console.error('SSE error:', e); }
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 3000); };
}

// =========================================================================
// Init
// =========================================================================
async function init() {
  const list = await fetchSessions();
  updateSessionSelect(list);
  if (currentSessionId) await refresh();
  connectSSE();
  setInterval(async () => { const list = await fetchSessions(); updateSessionSelect(list); if (currentSessionId) await refresh(); }, 5000);
}
init();
</script>
